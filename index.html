<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory Game</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: sans-serif; color: white;
        }

        /* Video Background Fixed */
        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -2; transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* ပိုမှောင်စေရန် Overlay */
        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; position: relative; z-index: 10;
        }

        h1 { font-size: 2.2rem; margin-bottom: 5px; }
        p { margin-bottom: 20px; opacity: 0.8; }

        /* ဂိမ်းကွက်များ ပေါ်လာစေရန် */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 320px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .cell.active {
            background-color: #f1c40f !important;
            box-shadow: 0 0 15px #f1c40f;
        }

        .start-btn {
            background: #f1c40f; color: #000;
            border: none; padding: 15px 60px;
            font-size: 1.2rem; font-weight: bold;
            border-radius: 12px; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Video လမ်းကြောင်း (သင့် Video အလုပ်မလုပ်ရင် ဒါနဲ့အရင်စမ်းကြည့်ပါ) -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-connection-loop-2821-large.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="container">
        <h1>Pattern Memory</h1>
        <p id="status">Remember the sequence</p>

        <div class="grid" id="grid">
            <!-- 16 Cells -->
            <div class="cell" onclick="clickCell(0)"></div>
            <div class="cell" onclick="clickCell(1)"></div>
            <div class="cell" onclick="clickCell(2)"></div>
            <div class="cell" onclick="clickCell(3)"></div>
            <div class="cell" onclick="clickCell(4)"></div>
            <div class="cell" onclick="clickCell(5)"></div>
            <div class="cell" onclick="clickCell(6)"></div>
            <div class="cell" onclick="clickCell(7)"></div>
            <div class="cell" onclick="clickCell(8)"></div>
            <div class="cell" onclick="clickCell(9)"></div>
            <div class="cell" onclick="clickCell(10)"></div>
            <div class="cell" onclick="clickCell(11)"></div>
            <div class="cell" onclick="clickCell(12)"></div>
            <div class="cell" onclick="clickCell(13)"></div>
            <div class="cell" onclick="clickCell(14)"></div>
            <div class="cell" onclick="clickCell(15)"></div>
        </div>

        <button class="start-btn" onclick="startGame()">START</button>
    </div>

    <script>
        let sequence = [];
        const cells = document.querySelectorAll('.cell');

        function startGame() {
            sequence = [];
            document.getElementById('status').innerText = "Starting...";
            addLevel();
        }

        function addLevel() {
            const random = Math.floor(Math.random() * 16);
            sequence.push(random);
            playSequence();
        }

        function playSequence() {
            let i = 0;
            const timer = setInterval(() => {
                const cellIdx = sequence[i];
                cells[cellIdx].classList.add('active');
                
                setTimeout(() => {
                    cells[cellIdx].classList.remove('active');
                }, 400);

                i++;
                if (i >= sequence.length) clearInterval(timer);
            }, 800);
        }

        function clickCell(index) {
            cells[index].classList.add('active');
            setTimeout(() => cells[index].classList.remove('active'), 200);
        }
    </script>
</body>
</html>
