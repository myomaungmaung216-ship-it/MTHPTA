<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory App</title>
    <style>
        /* CSS ကို ဒီမှာ တစ်ခါတည်း ထည့်ထားပေးပါတယ် */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* Video Background */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            object-fit: cover;
        }

        /* Video ပေါ်မှာ အမည်းရောင် အုပ်ထားရန် (Overlay) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7); /* အမည်းရောင် ပိုမှောင်ချင်ရင် 0.7 ကို တိုးပါ */
            z-index: -1;
        }

        /* Game UI Content */
        .game-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .start-btn {
            background-color: #f1c40f;
            color: black;
            border: none;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.1);
            background-color: #d4ac0d;
        }
    </style>
</head>
<body>

    <!-- Video Background -->
    <video autoplay muted loop id="bg-video">
        <source src="your-video.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <!-- Black Overlay Layer -->
    <div class="overlay"></div>

    <!-- Main Game UI -->
    <div class="game-container">
        <img src="https://cdn-icons-png.flaticon.com/512/3665/3665910.png" alt="Brain" width="100">
        <h1>Pattern Memory</h1>
        <p>Remember the sequence of 7 cells</p>
        <br>
        <button class="start-btn" onclick="startGame()">START</button>
    </div>

    <script>
        function startGame() {
            alert("ဂိမ်းစတင်ပါပြီ!");
            // သင်ရေးထားတဲ့ game logic code တွေကို ဒီအောက်မှာ ထပ်ထည့်နိုင်ပါတယ်
        }
    </script>

</body>
</html>
